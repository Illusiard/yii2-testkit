services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php-fpm
    ports:
      - "${TESTKIT_HTTP_PORT:-8080}:80"
    environment:
      NGINX_ENVSUBST_FILTER: ^TESTKIT_
      TESTKIT_ENTRY_SCRIPT: ${TESTKIT_ENTRY_SCRIPT}
    volumes:
      - ${TESTKIT_PROJECT_ROOT}:/app
      - ${TESTKIT_WEB_ROOT}:/testkit-web-root
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    env_file:
      - ${TESTKIT_RUNTIME_ENV_FILE}

  php-fpm:
    build:
      context: ./php
    working_dir: /app
    volumes:
      - ${TESTKIT_PROJECT_ROOT}:/app
      - ${TESTKIT_WEB_ROOT}:/testkit-web-root
    environment:
      YII_DEBUG: "1"
      YII_ENV: test
    env_file:
      - ${TESTKIT_RUNTIME_ENV_FILE}

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    env_file:
      - ${TESTKIT_RUNTIME_ENV_FILE}

  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    env_file:
      - ${TESTKIT_RUNTIME_ENV_FILE}

  redis:
    image: redis:7-alpine
    env_file:
      - ${TESTKIT_RUNTIME_ENV_FILE}

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    env_file:
      - ${TESTKIT_RUNTIME_ENV_FILE}
